name: bootstrap-project-config
version: "1.0.0"
description: Schema for project configuration generated by bootstrap-gui

fields:
  - name: project_name
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: Kebab-case project name

  - name: stack
    type: string
    enum: [go, python, node, rust]
    description: Primary technology stack

  - name: github_org
    type: string
    description: GitHub organization name

  - name: governance_version
    type: string
    description: Governance version to bootstrap against

  - name: features
    type: array
    items:
      type: string
      enum: [hooks, ci, observability, data-platform, cursor-rules]
    description: Optional features to include
